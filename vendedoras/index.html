<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero Vendedoras & Agencias — TicketYa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --bg:#F0F3F8;
  --card:#FFFFFF;
  --border:#E0E8F0;
  --text:#1A2340;
  --muted:#6B7A99;
  --accent:#0EA5E9;
  --shadow:0 2px 6px rgba(15,30,60,.06),0 12px 28px rgba(15,30,60,.07);
}

/* Reset */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:3rem;
}

/* Header */
#topBar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:1rem;
  padding:.9rem 1.5rem;
  background:#fff;
  border-bottom:1px solid var(--border);
}
#topBar img{height:38px;border-radius:6px}

.live-badge{
  display:flex;align-items:center;gap:.45rem;
  background:#ECFEFF;
  color:#0369A1;
  font-size:.7rem;
  font-weight:700;
  padding:.35rem .7rem;
  border-radius:999px;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:#0EA5E9;
  animation:pulse 1.4s infinite;
}
@keyframes pulse{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}

.stat-pill{
  background:#F7FAFF;
  border:1px solid var(--border);
  border-radius:999px;
  padding:.35rem .8rem;
  font-size:.75rem;
}
.stat-pill strong{color:var(--accent)}

.export-btn{
  margin-left:auto;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:999px;
  font-size:.75rem;
  padding:.45rem .9rem;
  cursor:pointer;
}

/* Layout */
.main{
  max-width:1560px;
  margin:auto;
  padding:1.6rem;
  display:flex;
  flex-direction:column;
  gap:1.6rem;
}
.section-title{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.14em;
  font-weight:700;
  color:var(--accent);
  display:flex;
  align-items:center;
  gap:.5rem;
}
.section-title::after{
  content:'';flex:1;height:1px;background:var(--border);
}

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:.9rem;
}
.kpi-card{
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:1rem;
}

.chart-card{
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:1.2rem;
}
.chart-title{font-weight:700;font-size:.9rem}
.chart-sub{font-size:.7rem;color:var(--muted);margin-bottom:.8rem}

/* Loading / error */
#loading,#errorScreen{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#errorScreen{display:none}
.spinner{
  width:36px;height:36px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div id="loading"><div class="spinner"></div></div>

<div id="errorScreen">
  <div class="chart-card">
    <h3>Error al cargar datos</h3>
    <p id="errorMsg"></p>
    <button onclick="init()">Reintentar</button>
  </div>
</div>

<div id="topBar">
  <img src="logo.png">
  <div class="live-badge"><span class="live-dot"></span>En vivo · Archivo CSV</div>
  <div class="stat-pill">Consultas <strong id="hdr-total">—</strong></div>
  <div class="stat-pill">Agencias <strong id="hdr-ag">—</strong></div>
  <div class="stat-pill">Semanas <strong id="hdr-sem">—</strong></div>
  <button class="export-btn" onclick="exportPNG()">Exportar PNG</button>
</div>

<div id="dashboard" class="main">

  <div>
    <div class="section-title">Performance por Vendedora</div>
    <div id="kpi-grid" class="kpi-grid"></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Ranking general</div>
    <div class="chart-sub">Total de consultas por vendedora</div>
    <canvas id="chartRanking" height="260"></canvas>
  </div>

</div>

<script>
const DATA_URL = '../recursos/vendedoras.csv';

function parseCSV(text){
  const [h,...l]=text.trim().split(/\r?\n/);
  const heads=h.split(',').map(x=>x.trim());
  return l.map(r=>{
    const o={},v=r.split(',');
    heads.forEach((k,i)=>o[k]=v[i]||'');
    return o;
  });
}

async function loadData(){
  const ctrl=new AbortController();
  setTimeout(()=>ctrl.abort(),12000);
  try{
    const r=await fetch(DATA_URL,{signal:ctrl.signal});
    if(!r.ok) throw new Error();
    return parseCSV(await r.text());
  }catch(e){
    showError('No se pudo cargar el archivo vendedoras.csv');
    return null;
  }
}

function showError(msg){
  document.getElementById('errorMsg').textContent=msg;
  document.getElementById('loading').style.display='none';
  document.getElementById('errorScreen').style.display='flex';
}

function render(rows){
  document.getElementById('hdr-total').textContent = rows.length;
  document.getElementById('hdr-ag').textContent =
    new Set(rows.map(r=>r['Agencia'])).size;
  document.getElementById('hdr-sem').textContent = '—';

  new Chart(chartRanking,{
    type:'bar',
    data:{
      labels:['Total'],
      datasets:[{
        data:[rows.length],
        backgroundColor:'#0EA5E9',
        borderRadius:8
      }]
    },
    options:{responsive:true}
  });

  document.getElementById('loading').style.display='none';
}

function exportPNG(){
  html2canvas(document.getElementById('dashboard'),{scale:2})
    .then(c=>{
      const a=document.createElement('a');
      a.download='tablero_vendedoras_agencias.png';
      a.href=c.toDataURL();
      a.click();
    });
}

async function init(){
  const data=await loadData();
  if(data) render(data);
}
init();
</script>

</body>
</html>
